{% extends 'base/base.html' %}
{% block title %}Nouvelle catégorie{% endblock %}
{% block page_title %}Nouvelle catégorie{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
<div class="card"><div class="card-body p-4">
<form method="post">{% csrf_token %}
  <div class="mb-3"><label class="form-label">Nom *</label>{{ form.nom }}</div>
  <div class="mb-3"><label class="form-label">Description</label>{{ form.description }}</div>
  <button type="submit" class="btn btn-primary">Enregistrer</button>
  <a href="{% url 'produits:categories' %}" class="btn btn-outline-secondary ms-2">Annuler</a>
</form>
</div></div>
</div></div>
{% endblock %}

{% extends 'base/base.html' %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Boutique ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1a3c5e 0%, #2980b9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .login-brand { text-align: center; margin-bottom: 32px; }
  .login-brand .icon { width: 64px; height: 64px; background: #1a3c5e; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 2rem; }
  .login-brand h1 { font-size: 1.5rem; font-weight: 700; color: #1a3c5e; }
  .login-brand p { color: #7f8c8d; font-size: .9rem; }
  .form-control { border-radius: 10px; padding: 12px 14px; border-color: #dde4ee; }
  .form-control:focus { border-color: #2980b9; box-shadow: 0 0 0 3px rgba(41,128,185,.15); }
  .btn-login { background: #1a3c5e; border: none; border-radius: 10px; padding: 12px; font-weight: 600; font-size: 1rem; width: 100%; color: #fff; }
  .btn-login:hover { background: #15324f; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <div class="icon">🏪</div>
    <h1>Boutique ERP</h1>
    <p>Système de gestion de boutique</p>
  </div>
  {% if form.errors %}
  <div class="alert alert-danger alert-sm">Identifiants incorrects.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Nom d'utilisateur</label>
      <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Mot de passe</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Se connecter</button>
  </form>
  <p class="text-center text-muted mt-4" style="font-size:.8rem">Boutique ERP — Brazzaville, Congo</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
